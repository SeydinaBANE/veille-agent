services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage/snapshots:/app/storage/snapshots
      - ./output/reports:/app/output/reports
    healthcheck:
      test: ["CMD", "uv", "run", "python", "healthcheck.py"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
